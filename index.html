<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Language Translation Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="translator-panel" aria-labelledby="app-title">
      <div class="panel-top">
        <p class="eyebrow">
          <span class="eyebrow-dot"></span>
          AI Internship Project
        </p>

        <nav class="theme-bar" aria-label="Theme switcher">
          <button class="theme-btn active" data-theme-btn="system" type="button" title="Match system theme">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.4-6.4-1.4 1.4M7 17l-1.4 1.4m0-12.8L7 7m10 10 1.4 1.4"/></svg>
            System
          </button>
          <button class="theme-btn" data-theme-btn="light" type="button" title="Light mode">
            <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2m10-10h-2M4 12H2m17.1-7.1-1.4 1.4M6.3 17.7l-1.4 1.4m0-14.2 1.4 1.4m11.4 11.4 1.4 1.4"/></svg>
            Light
          </button>
          <button class="theme-btn" data-theme-btn="dark" type="button" title="Dark mode">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 15.5A8.5 8.5 0 0 1 8.5 3 7 7 0 1 0 21 15.5Z"/></svg>
            Dark
          </button>
        </nav>
      </div>

      <div class="title-block">
        <h1 id="app-title">
          <span class="title-gradient">Language Translation Tool</span>
        </h1>
        <p class="subtitle">
          Enter text, choose your languages and translate it using a live web API.
        </p>
      </div>

      <div class="info-strip" aria-label="Project highlights">
        <span>
          <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.3 2.5 3.5 5.5 3.5 9s-1.2 6.5-3.5 9M12 3C9.7 5.5 8.5 8.5 8.5 12S9.7 18.5 12 21"/></svg>
          Live API
        </span>
        <span>
          <svg aria-hidden="true" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"/></svg>
          Copy Output
        </span>
        <span>
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg>
          Text to Speech
        </span>
        <span>
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M16 3l5 5-5 5M21 8H9M8 21l-5-5 5-5M3 16h12"/></svg>
          Language Swap
        </span>
      </div>

      <div class="language-row">
        <label for="sourceLanguage">
          Source Language
          <select id="sourceLanguage">
            <option value="auto">Auto Detect</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
          </select>
        </label>

        <button id="swapButton" class="icon-button" type="button" title="Swap languages" aria-label="Swap source and target languages">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M16 3l5 5-5 5M21 8H9M8 21l-5-5 5-5M3 16h12"/>
          </svg>
        </button>

        <label for="targetLanguage">
          Target Language
          <select id="targetLanguage">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
          </select>
        </label>
      </div>

      <div class="text-grid">
        <label class="text-box" for="inputText">
          Input Text
          <div class="textarea-wrap">
            <textarea id="inputText" rows="10" placeholder="Type or paste text here..." spellcheck="true"></textarea>
            <span class="char-count" id="charCount" aria-live="polite">0 / 500</span>
          </div>
        </label>

        <label class="text-box" for="outputText">
          Translated Text
          <div class="textarea-wrap">
            <textarea id="outputText" rows="10" readonly placeholder="Your translation will appear here..."></textarea>
          </div>
        </label>
      </div>

      <div class="actions">
        <button id="translateButton" class="primary-button" type="button">
          <span class="spinner" aria-hidden="true"></span>
          <svg class="btn-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/>
          </svg>
          <span class="btn-text">Translate</span>
        </button>

        <button id="sampleButton" class="secondary-button" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M9 3h6M10 3v6l-5 9a2 2 0 0 0 1.7 3h10.6A2 2 0 0 0 19 18l-5-9V3M8 14h8"/></svg>
          Sample
        </button>

        <button id="copyButton" class="secondary-button" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>

        <button id="speakButton" class="secondary-button" type="button">
          <svg class="speak-icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
          Speak
        </button>
      </div>

      <p id="statusMessage" class="status-message" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text"></span>
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
